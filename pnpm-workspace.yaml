packages:
  - packages/*
  - demos/*
  - tests
  - docs

catalog:
  "@robelest/fx": ^0.0.1-preview.4
  convex: ^1.34.0
  convex-test: ^0.0.41
  tsdown: 0.20.0-beta.3
  typescript: ^6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.13
  vite-plus: ^0.1.13
  vitest: npm:@voidzero-dev/vite-plus-test@latest
onlyBuiltDependencies:
  - esbuild
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
