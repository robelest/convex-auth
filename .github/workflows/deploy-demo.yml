name: Deploy Demo

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy. Defaults to the current branch."
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "convex/**"
      - "demos/svelte/**"
      - "packages/auth/**"
      - "packages/samlify/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-demo.yml"

concurrency:
  group: deploy-demo-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-demo:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      PUBLIC_DEPLOYMENT_ENV: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.15.0
          cache: true
          run-install: |
            args: ['--frozen-lockfile']

      - name: Deploy demo backend and site
        run: vp exec convex deploy --cmd 'vp run build:demo' --cmd-url-env-var-name VITE_CONVEX_URL

      - name: Deploy demo site to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: demos/svelte
          packageManager: npm
          wranglerVersion: 4.83.0
          command: deploy
