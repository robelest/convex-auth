name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true
          run-install: |
            args: ['--frozen-lockfile']

      - name: Run consumer typecheck
        run: vp run '@robelest/convex-auth#typecheck:consumer'

      - name: Run packaging checks
        run: vp run '@robelest/convex-auth#check:packaging'
