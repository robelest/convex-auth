name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group:
    test-${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.15.0
          cache: true
          run-install: |
            args: ['--frozen-lockfile']

      - name: Build package prerequisites
        run: vp run '@robelest/samlify#build'

      - name: Run unit and node test projects
        run: vp test --run --project convex --project node --project samlify

  interop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.15.0
          cache: true
          run-install: |
            args: ['--frozen-lockfile']

      - name: Run Docker interop test project
        run: vp test --run --project interop
