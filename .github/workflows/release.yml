name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.15.0
          cache: true
          run-install: |
            args: ['--frozen-lockfile']

      - name: Build package prerequisites
        run: |
          vp run '@robelest/samlify#build'
          vp run '@robelest/convex-auth#build'

      - name: Run package publish checks
        run: |
          vp run '@robelest/convex-auth#typecheck:consumer'
          vp run '@robelest/convex-auth#check:packaging'

      - name: Resolve npm dist-tag
        working-directory: packages/auth
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG=${VERSION#*-}
            DIST_TAG=${DIST_TAG%%.*}
          else
            DIST_TAG=latest
          fi
          echo "NPM_DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"

      - name: Publish package
        working-directory: packages/auth
        run: vp exec npm publish --tag "$NPM_DIST_TAG"

  deploy-docs:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.15.0
          cache: true
          run-install: |
            args: ['--frozen-lockfile']

      - name: Deploy docs site
        run: vp run build:docs

      - name: Deploy docs site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./docs/build --project-name=convex-auth

  deploy-demo:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      PUBLIC_DEPLOYMENT_ENV: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.15.0
          cache: true
          run-install: |
            args: ['--frozen-lockfile']

      - name: Deploy demo backend and site
        run: vp exec convex deploy --cmd 'vp run build:demo' --cmd-url-env-var-name VITE_CONVEX_URL

      - name: Deploy demo site to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: demos/svelte
          command: deploy

  github-release:
    needs: [publish, deploy-docs, deploy-demo]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
